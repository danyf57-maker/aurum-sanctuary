name: Send Analytics Report Email

on:
  schedule:
    - cron: "23 6 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force send immediately"
        required: false
        default: "false"

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger analytics report endpoint
        env:
          ANALYTICS_EXPORT_SECRET: ${{ secrets.ANALYTICS_EXPORT_SECRET }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
        run: |
          if [ -z "$ANALYTICS_EXPORT_SECRET" ]; then
            echo "Missing ANALYTICS_EXPORT_SECRET secret"
            exit 1
          fi

          URL="https://aurumdiary.com/api/admin/analytics/report-email"
          if [ "$FORCE" = "true" ]; then
            URL="${URL}?force=1"
          fi

          curl -sS -X POST "$URL" \
            -H "Authorization: Bearer $ANALYTICS_EXPORT_SECRET" \
            -H "Content-Type: application/json"
