name: CI - Lint & Type Check

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop, staging]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Functions dependencies
        run: npm --prefix functions ci

      - name: Run verification harness
        run: npm run verify
        env:
          # Use non-production placeholders so the verification harness can run
          # without accidentally coupling CI to live Firebase/Stripe config.
          NEXT_PUBLIC_FIREBASE_API_KEY: dummy
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: aurum-dev-local.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: aurum-dev-local
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: aurum-dev-local.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "123456789"
          NEXT_PUBLIC_FIREBASE_APP_ID: 1:123456789:web:abc123
          NEXT_PUBLIC_APP_URL: http://localhost:9002
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: dummy.apps.googleusercontent.com
