# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Increase this value if you'd like to automatically spin up
  # more instances in response to increased traffic.
  maxInstances: 1

# Environment variables and secrets
env:
  # Firebase Client SDK (public config)
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: NEXT_PUBLIC_FIREBASE_API_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: aurum-staging-ae856.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: aurum-staging-ae856
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: aurum-staging-ae856.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    secret: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    secret: NEXT_PUBLIC_FIREBASE_APP_ID
    availability:
      - BUILD
      - RUNTIME
  # Secrets (from Secret Manager)
  - variable: DEEPSEEK_API_KEY
    secret: DEEPSEEK_API_KEY
    availability:
      - RUNTIME
  - variable: STRIPE_SECRET_KEY
    secret: STRIPE_SECRET_KEY
    availability:
      - RUNTIME
  # Stripe price IDs (staging/test only)
  - variable: NEXT_PUBLIC_STRIPE_PRICE_ID_MONTHLY
    secret: NEXT_PUBLIC_STRIPE_PRICE_ID_MONTHLY
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_STRIPE_PRICE_ID_YEARLY
    secret: NEXT_PUBLIC_STRIPE_PRICE_ID_YEARLY
    availability:
      - BUILD
      - RUNTIME
  # Google OAuth
  - variable: NEXT_PUBLIC_GOOGLE_CLIENT_ID
    secret: NEXT_PUBLIC_GOOGLE_CLIENT_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_APP_URL
    value: https://aurum-staging--aurum-staging-ae856.europe-west4.hosted.app
    availability:
      - BUILD
      - RUNTIME
  # Onboarding emails
  - variable: RESEND_API_KEY
    secret: RESEND_API_KEY
    availability:
      - RUNTIME
  - variable: ONBOARDING_EMAILS_ENABLED
    secret: ONBOARDING_EMAILS_ENABLED
    availability:
      - RUNTIME
  - variable: ONBOARDING_FROM_EMAIL
    secret: ONBOARDING_FROM_EMAIL
    availability:
      - RUNTIME
  - variable: ONBOARDING_REPLY_TO
    secret: ONBOARDING_REPLY_TO
    availability:
      - RUNTIME
  - variable: ONBOARDING_EMAIL_SECRET
    secret: ONBOARDING_EMAIL_SECRET
    availability:
      - RUNTIME
  - variable: ONBOARDING_RUN_SECRET
    secret: ONBOARDING_RUN_SECRET
    availability:
      - RUNTIME
  - variable: ONBOARDING_BOUNCE_SECRET
    secret: ONBOARDING_BOUNCE_SECRET
    availability:
      - RUNTIME
